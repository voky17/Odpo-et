    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd4e8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
    }

    /* Animované pozadí */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
            radial-gradient(circle at 20% 50%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(255, 105, 180, 0.2) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 900px;
        width: 100%;
    }

    .header {
        margin-bottom: 60px;
        animation: slideDown 0.8s ease-out;
    }

    .title {
        font-size: 3.5rem;
        font-weight: 700;
        color: #d4184f;
        margin-bottom: 15px;
        letter-spacing: -1px;
        text-shadow: 0 2px 4px rgba(212, 24, 79, 0.1);
    }

    .subtitle {
        font-size: 1.3rem;
        color: #c2185b;
        font-weight: 300;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .countdown-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 20px;
        margin: 50px 0;
        animation: fadeIn 1s ease-out 0.3s both;
    }

    .countdown-unit {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 30px 20px;
        box-shadow: 0 8px 32px rgba(212, 24, 79, 0.15);
        border: 2px solid rgba(255, 182, 193, 0.5);
        transition: all 0.3s ease;
        animation: popIn 0.6s ease-out;
    }

    .countdown-unit:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 40px rgba(212, 24, 79, 0.25);
        border-color: rgba(212, 24, 79, 0.3);
    }

    .countdown-number {
        font-size: 3rem;
        font-weight: 800;
        background: linear-gradient(135deg, #d4184f 0%, #ff69b4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 10px;
        font-variant-numeric: tabular-nums;
    }

    .countdown-label {
        font-size: 0.95rem;
        color: #d4184f;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .footer {
        margin-top: 60px;
        animation: fadeIn 1s ease-out 0.6s both;
    }

    .date-info {
        font-size: 1.1rem;
        color: #d4184f;
        font-weight: 500;
        margin-bottom: 20px;
    }

    .message {
        font-size: 0.95rem;
        color: #c2185b;
        font-style: italic;
        letter-spacing: 0.5px;
    }

    /* Animace */
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    @keyframes popIn {
        0% {
            opacity: 0;
            transform: scale(0.8);
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: scale(1);
        }
    }

    /* Puls efekt na číslech */
    .countdown-number.pulse {
        animation: numberPulse 0.6s ease-out;
    }

    @keyframes numberPulse {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.1);
        }
        100% {
            transform: scale(1);
        }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .title {
            font-size: 2.5rem;
        }

        .subtitle {
            font-size: 1rem;
        }

        .countdown-container {
            gap: 15px;
        }

        .countdown-unit {
            padding: 20px 15px;
        }

        .countdown-number {
            font-size: 2.2rem;
        }

        .countdown-label {
            font-size: 0.85rem;
        }
    }

    @media (max-width: 480px) {
        .title {
            font-size: 2rem;
        }

        .countdown-container {
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .countdown-unit {
            padding: 18px 12px;
            border-radius: 15px;
        }

        .countdown-number {
            font-size: 1.8rem;
        }
    }
</style>

    <div class="countdown-container">
        <div class="countdown-unit">
            <div class="countdown-number" id="days">0</div>
            <div class="countdown-label">Dní</div>
        </div>
        <div class="countdown-unit">
            <div class="countdown-number" id="hours">0</div>
            <div class="countdown-label">Hodin</div>
        </div>
        <div class="countdown-unit">
            <div class="countdown-number" id="minutes">0</div>
            <div class="countdown-label">Minut</div>
        </div>
        <div class="countdown-unit">
            <div class="countdown-number" id="seconds">0</div>
            <div class="countdown-label">Sekund</div>
        </div>
    </div>

    <div class="footer">
        <div class="date-info">
            📅 11. dubna 2026 v 8:00 ráno (Praha)
        </div>
        <div class="message">
            ✨ Už se těšíme! ✨
        </div>
    </div>
</div>

<script>
    function updateCountdown() {
        // Cílový čas: 11.4.2026 08:00 Praha (CET/CEST)
        const targetDate = new Date('2026-04-11T08:00:00+02:00').getTime();
        const now = new Date().getTime();
        const distance = targetDate - now;

        // Výpočty
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Aktualizace DOM
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        // Detekce změny (pro animaci)
        if (daysEl.textContent !== String(days)) {
            daysEl.textContent = days;
            daysEl.classList.remove('pulse');
            void daysEl.offsetWidth; // Trigger reflow
            daysEl.classList.add('pulse');
        } else {
            daysEl.textContent = days;
        }

        hoursEl.textContent = String(hours).padStart(2, '0');
        minutesEl.textContent = String(minutes).padStart(2, '0');
        secondsEl.textContent = String(seconds).padStart(2, '0');

        // Pokud je čas, zobraz speciální zprávu
        if (distance < 0) {
            document.querySelector('.message').textContent = '🎉 Čas je tady! Oslava začíná! 🎉';
        }
    }

    // Inicializuj ihned
    updateCountdown();

    // Aktualizuj každou sekundu
    setInterval(updateCountdown, 1000);
</script>
